name: Daily Maker Commit

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate daily artifact
        run: python scripts/daily_maker.py

      - name: Commit daily artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily index.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily maker entry for $(date -u +%F)"
            git push
          fi
